<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>龍英交易管理後台（手機版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body,#root { margin:0; background:#0F131A; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }

</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ===== 儀表板（D_）=====

/* =============================================================
   龍英交易管理後台 — 手機版儀表板首頁
   設計方向：手機優先（mobile-first）
   - 頂部精簡品牌列 + 通知鈴
   - 內容單欄垂直捲動
   - 底部固定導覽列（含紅點徽章）
   - 操作按鈕 ≥ 44px，關鍵操作走二次確認面板
   設計 Token 沿用桌機版（深色）
   ============================================================= */

function D_App() {
  const [tab, setTab] = useState("dashboard");
  const [confirm, setConfirm] = useState(null); // 二次確認面板狀態

  return (
    <div className="phone-frame text-gray-100">
      <D_TopBar />

      {/* 內容區：底部留白給導覽列 + 安全區 */}
      <div className="px-4 pb-28 pt-3 space-y-4">
        <D_AlertCards />
        <D_SectionTitle icon="◧" title="平台概況" />
        <D_KpiGrid />
        <D_SectionTitle icon="✓" title="待處理事項" hint="點擊處理" />
        <D_TodoList onAction={setConfirm} />
        <D_SectionTitle icon="⚠" title="丙種追繳倒數" hint="明日 10:00 截止" />
        <D_MarginCallList onAction={setConfirm} />
        <D_SectionTitle icon="◔" title="今日損益" />
        <D_PnlCard />
      </div>

      <D_BottomNav tab={tab} onSelect={setTab} />

      {/* 二次確認面板（由底部滑入的概念，這裡用置中遮罩呈現） */}
      {confirm && (
        <D_ConfirmSheet data={confirm} onClose={() => setConfirm(null)} />
      )}
    </div>
  );
}

/* ---------- 頂部品牌列 ---------- */
function D_TopBar() {
  return (
    <header className="sticky top-0 z-20 flex items-center justify-between border-b border-white/5 bg-[#0B0E14]/95 px-4 py-3 backdrop-blur">
      <div>
        <h1 className="text-lg font-bold leading-none text-white">龍英</h1>
        <p className="mt-0.5 text-[11px] text-gray-500">交易管理後台</p>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-[11px] text-gray-500">13:30:05</span>
        <button className="relative flex h-9 w-9 items-center justify-center rounded-full bg-white/5" aria-label="通知">
          <D_BellIcon className="h-5 w-5 text-gray-300" />
          <span className="absolute -right-0.5 -top-0.5 flex h-4 min-w-4 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-semibold text-white">4</span>
        </button>
      </div>
    </header>
  );
}

/* ---------- 警報卡（手機上一眼看到最緊急的事） ---------- */
function D_AlertCards() {
  return (
    <div className="space-y-2.5">
      <div className="rounded-2xl border border-red-500/30 bg-red-500/10 px-4 py-3.5">
        <div className="flex items-center gap-2">
          <D_AlertCircleIcon className="h-5 w-5 shrink-0 text-red-400" />
          <p className="text-sm font-semibold text-red-400">丙種追繳：2 位客戶擔保不足</p>
        </div>
        <p className="mt-1.5 pl-7 text-xs text-gray-400">張三、陳小華 保證金低於門檻 · 明日 10:00 截止</p>
      </div>
      <div className="rounded-2xl border border-amber-500/30 bg-amber-500/10 px-4 py-3.5">
        <div className="flex items-center gap-2">
          <D_AlertTriangleIcon className="h-5 w-5 shrink-0 text-amber-400" />
          <p className="text-sm font-semibold text-amber-400">券商可用餘額偏低</p>
        </div>
        <p className="mt-1.5 pl-7 text-xs text-gray-400">$2,100,000 · 建議匯入資金應對新委託</p>
      </div>

}

/* ---------- 區塊標題 ---------- */
function D_SectionTitle({ icon, title, hint }) {

    <div className="flex items-center justify-between pt-1">

        <h2 className="text-sm font-semibold text-gray-200">{title}</h2>
      </div>
      {hint && <span className="text-[11px] text-gray-600">{hint}</span>}

}

/* ---------- 關鍵指標：手機用 2 欄 ---------- */
const D_KPIS = [

  { label: "今日總損益", value: "+$842K", sub: "實現 + 未實現", tone: "text-emerald-400" },
  { label: "待追繳", value: "2", sub: "擔保不足", tone: "text-red-400" },
  { label: "券商可用", value: "$2.1M", sub: "低於水位", tone: "text-amber-400" },
];
function D_KpiGrid() {

}

/* ---------- 待處理事項：每項可點，觸發確認面板 ---------- */
const D_TODOS = [

  { id: "withdraw", label: "待審核出金", count: 1, hint: "收盤後申請", tone: "blue", actionLabel: "審核" },

];

/* ---------- 丙種追繳：可展開看持倉 + 平倉操作 ---------- */
const D_MARGIN = [
  { name: "張三", shortfall: "$1,300,000", invested: "$50,000,000",
    positions: [
      { code: "2330", name: "台積電", qty: 1, pct: 18, advice: "流動性佳，可市價平倉" },
      { code: "2454", name: "聯發科", qty: 2, pct: 9, advice: "分批限價，避免衝擊" },
    ] },

    positions: [
      { code: "2317", name: "鴻海", qty: 5, pct: 12, advice: "流動性佳，可市價平倉" },
    ] },
];

                <div className="text-right">
                  <p className="text-sm font-bold text-red-400">需補保 {m.shortfall}</p>

                <p className="mb-2 text-xs text-gray-500">持倉明細（佔當日成交量比例）</p>

                  {m.positions.map((p) => (

/* ---------- 今日損益小卡 ---------- */

/* ---------- 底部導覽列 ---------- */
const D_NAV = [
  { key: "dashboard", label: "儀表板", icon: D_GridIcon },
  { key: "members", label: "會員", icon: D_UsersIcon },
  { key: "margincall", label: "追繳", icon: D_AlertTriangleIcon, badge: 2 },

/* ---------- 二次確認面板 ---------- */
function D_ConfirmSheet({ data, onClose }) {
  const [slid, setSlid] = useState(0); // 滑動確認進度 0~100
  const [done, setDone] = useState(false);

  const D_handleConfirm = () => {
    setDone(true);
    setTimeout(onClose, 900);
  };

  return (
    <div className="fixed inset-0 z-30 mx-auto flex max-w-[420px] flex-col justify-end bg-black/60" onClick={onClose}>
      <div className="rounded-t-3xl bg-[#161B24] p-5 pb-8" onClick={(e) => e.stopPropagation()}>
        {/* 拖曳把手 */}
        <div className="mx-auto mb-4 h-1 w-10 rounded-full bg-white/15" />

        {done ? (
          <div className="py-8 text-center">
            <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-emerald-500/15">
              <D_CheckIcon className="h-7 w-7 text-emerald-400" />
            </div>
            <p className="text-base font-semibold text-white">已送出</p>
            <p className="mt-1 text-sm text-gray-500">（模擬：未連接真實券商）</p>
          </div>
        ) : (
          <>
            <h3 className={`text-lg font-bold ${data.danger ? "text-red-400" : "text-white"}`}>{data.title}</h3>
            <p className="mt-3 whitespace-pre-line text-sm leading-relaxed text-gray-300">{data.body}</p>

            {data.slide ? (
              <D_SlideToConfirm onComplete={D_handleConfirm} />
            ) : (
              <div className="mt-5 flex gap-3">
                <button onClick={onClose} className="h-12 flex-1 rounded-xl bg-white/5 text-sm font-medium text-gray-300 active:scale-95">取消</button>
                <button onClick={D_handleConfirm} className={`h-12 flex-1 rounded-xl text-sm font-semibold active:scale-95 ${data.danger ? "bg-red-500 text-white" : "bg-blue-500 text-white"}`}>{data.confirmLabel}</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ---------- 滑動確認（高風險操作用） ---------- */
function D_SlideToConfirm({ onComplete }) {
  const [x, setX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const D_trackRef = React.useRef(null);

  const D_maxX = () => (D_trackRef.current ? D_trackRef.current.offsetWidth - 56 : 240);

  const D_move = (clientX) => {
    if (!D_trackRef.current) return;
    const D_rect = D_trackRef.current.getBoundingClientRect();
    let nx = clientX - D_rect.left - 28;
    nx = Math.D_max(0, Math.min(nx, D_maxX()));
    setX(nx);
    if (nx >= D_maxX() - 4) { setDragging(false); onComplete(); }
  };

  return (
    <div className="mt-5">
      <div ref={D_trackRef}
        className="relative h-14 w-full overflow-hidden rounded-2xl bg-red-500/15"
        onMouseMove={(e) => dragging && D_move(e.clientX)}
        onMouseUp={() => { setDragging(false); setX(0); }}
        onMouseLeave={() => { setDragging(false); setX(0); }}
        onTouchMove={(e) => D_move(e.touches[0].clientX)}
        onTouchEnd={() => setX(0)}>
        <span className="absolute inset-0 flex items-center justify-center text-sm font-medium text-red-300/80">向右滑動以確認平倉 →</span>
        <button
          onMouseDown={() => setDragging(true)}
          className="absolute top-1 flex h-12 w-12 items-center justify-center rounded-xl bg-red-500 text-white"
          style={{ left: (4 + x) + "px", touchAction: "none" }}>
          <D_ArrowRightIcon className="h-6 w-6" />
        </button>
      </div>
      <p className="mt-2 text-center text-[11px] text-gray-600">防誤觸：需滑到底才會送出</p>
    </div>
  );
}

/* ---------- 圖示 ---------- */
function D_b(p){return{fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round",viewBox:"0 0 24 24",...p};}
function D_GridIcon(p){return(<svg {...D_b(p)}><D_rect x="3" y="3" width="7" height="7" rx="1"/><D_rect x="14" y="3" width="7" height="7" rx="1"/><D_rect x="3" y="14" width="7" height="7" rx="1"/><D_rect x="14" y="14" width="7" height="7" rx="1"/></svg>);}
function D_UsersIcon(p){return(<svg {...D_b(p)}><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6"/></svg>);}

function D_AlertCircleIcon(p){return(<svg {...D_b(p)}><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 15.5v.5"/></svg>);}

// ===== 會員（M_）=====

const M_fmt = (n) => "$" + n.toLocaleString("en-US");
const M_pnlColor = (n) => (n > 0 ? "text-emerald-400" : n < 0 ? "text-red-400" : "text-gray-300");

// 擔保比例統一標準（與丙種追繳、出入金頁一致）：強制線 50%、安全線 60%
// 丙種保證金風控（與丙種追繳頁一致）：最低維持 = 已投入 × 20%、判斷扣累計利息
const M_MAINTENANCE_RATE = 0.20;
const M_DAILY_INTEREST_RATE = 0.0004;
function M_calcMargin(invested, margin, accruedInterest) {
  const M_threshold = invested * M_MAINTENANCE_RATE;
  const M_netValue = margin - accruedInterest;
  const M_shortfall = Math.max(0, M_threshold - M_netValue);
  const M_available = Math.max(0, M_netValue - M_threshold);
  const M_needCall = M_netValue < M_threshold;
  const M_health = M_threshold > 0 ? M_netValue / M_threshold : 1;
  return { M_threshold, M_netValue, M_shortfall, M_available, M_needCall, M_health };
}
const M_dailyInterest = (invested) => Math.round(invested * M_DAILY_INTEREST_RATE);
const M_marginColor = (M_health) => (M_health >= 1.2 ? "text-emerald-400" : M_health >= 1 ? "text-amber-400" : "text-red-400");
const M_marginBar = (M_health) => (M_health >= 1.2 ? "bg-emerald-500" : M_health >= 1 ? "bg-amber-500" : "bg-red-500");
const M_pnlText = (n) => (n > 0 ? "+" : "") + M_fmt(n);

function M_App() {
  const [members, setMembers] = useState(M_MEMBERS);
  const [selected, setSelected] = useState(null);
  const [confirm, setConfirm] = useState(null);

  const M_applyResult = (data) => {
    if (data.act === "toggleStatus") {
      setMembers((prev) => prev.map((m) => m.id === data.id
        ? { ...m, status: m.status === "active" ? "disabled" : "active" } : m));
      setSelected((s) => s && s.id === data.id
        ? { ...s, status: s.status === "active" ? "disabled" : "active" } : s);
    }
  };

  const M_seqRef = React.useRef(1000);
  const M_addNote = (memberId, note) => {
    M_seqRef.M_current += 1;
    const M_now = new Date();
    const M_stamp = `${String(M_now.getMonth() + 1).padStart(2, "0")}/${String(M_now.getDate()).padStart(2, "0")} ${String(M_now.getHours()).padStart(2, "0")}:${String(M_now.getMinutes()).padStart(2, "0")}:${String(M_now.getSeconds()).padStart(2, "0")}`;
    const M_full = { ...note, by: "管理員A", time: M_stamp, _seq: M_seqRef.M_current };
    setMembers((prev) => prev.map((m) => {
      if (m.id !== memberId) return m;
      // 同時只能有一條置頂：新記事若置頂，舊的全部取消置頂
      const M_existing = note.pinned ? m.notes.map((n) => ({ ...n, pinned: false })) : m.notes;
      return { ...m, notes: [M_full, ...M_existing] };
    }));
  };

  const M_current = selected ? members.find((m) => m.id === selected.id) || selected : null;

  return (
    <div className="phone-frame text-gray-100">
      {M_current
        ? <M_Detail m={M_current} onBack={() => setSelected(null)} onAction={setConfirm} onAddNote={M_addNote} />
        : <M_List members={members} onSelect={setSelected} />}
      {confirm && <M_ConfirmSheet data={confirm} onClose={() => setConfirm(null)} onConfirmed={M_applyResult} />}
    </div>
  );
}

/* ====================== 列表 ====================== */
const M_STATUS_MAP = {
  active: ["正常", "bg-emerald-500/15 text-emerald-400"],
  disabled: ["停用", "bg-gray-500/20 text-gray-400"],
  locked: ["鎖定", "bg-red-500/15 text-red-400"],
};

function M_List({ members, onSelect }) {
  const [q, setQ] = useState("");
  const [fIdentity, setFIdentity] = useState("all"); // all / A / B / both
  const [fStatus, setFStatus] = useState("all");

  const M_filtered = members.filter((m) => {
    const M_matchQ = q === "" || m.name.includes(q) || m.phone.replace(/-/g, "").includes(q.replace(/-/g, ""));
    const M_matchI = fIdentity === "all"
      || (fIdentity === "both" && m.identities.length === 2)
      || (fIdentity === "A" && m.identities.includes("A"))
      || (fIdentity === "B" && m.identities.includes("B"));
    const M_matchS = fStatus === "all" || m.status === fStatus;
    return M_matchQ && M_matchI && M_matchS;
  });

  return (
    <>
      <header className="sticky top-0 z-20 border-b border-white/5 bg-[#0B0E14]/95 px-4 py-3 backdrop-blur">
        <h1 className="text-lg font-bold text-white">會員管理</h1>
        {/* 搜尋 */}
        <div className="mt-3 flex items-center rounded-xl bg-[#161B24] px-3">
          <M_SearchIcon className="h-4 w-4 text-gray-500" />
          <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="搜尋姓名或手機號碼"
            className="w-full bg-transparent py-2.5 pl-2 text-sm text-white outline-none placeholder:text-gray-600" />
          {q && <button onClick={() => setQ("")} className="text-gray-500"><M_CloseIcon className="h-4 w-4" /></button>}
        </div>
        {/* 篩選 */}
        <div className="mt-2.5 flex gap-2 overflow-x-auto pb-0.5">
          <M_FilterChip label="全部身份" active={fIdentity === "all"} onClick={() => setFIdentity("all")} />
          <M_FilterChip label="A 交易員" active={fIdentity === "A"} onClick={() => setFIdentity("A")} />
          <M_FilterChip label="B 丙種" active={fIdentity === "B"} onClick={() => setFIdentity("B")} />
          <M_FilterChip label="A+B" active={fIdentity === "both"} onClick={() => setFIdentity("both")} />
          <span className="mx-0.5 w-px shrink-0 bg-white/10" />
          <M_FilterChip label="正常" active={fStatus === "active"} onClick={() => setFStatus(fStatus === "active" ? "all" : "active")} />
          <M_FilterChip label="停用/鎖定" active={fStatus === "locked"} onClick={() => setFStatus(fStatus === "locked" ? "all" : "locked")} />
        </div>
      </header>

      <div className="px-4 pb-10 pt-3 space-y-2.5">
        <p className="px-1 text-[11px] text-gray-600">共 {M_filtered.length} 位會員</p>
        {M_filtered.map((m) => (
          <button key={m.id} onClick={() => onSelect(m)}
            className="w-full rounded-2xl bg-[#161B24] p-4 text-left active:scale-[0.99]">
            <div className="flex items-start justify-between">
              <div className="flex items-center gap-2.5">
                <div className="flex h-10 w-10 items-center justify-center rounded-full bg-white/5 text-sm font-bold text-gray-300">
                  {m.name[0]}
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-semibold text-gray-100">{m.name}</span>
                    {m.identities.map((id) => (
                      <span key={id} className={`rounded px-1.5 py-0.5 text-[10px] font-medium ${
                        id === "A" ? "bg-blue-500/15 text-blue-400" : "bg-violet-500/15 text-violet-400"}`}>
                        {id === "A" ? "A" : "B"}
                      </span>
                    ))}
                  </div>
                  <p className="mt-0.5 text-[11px] text-gray-500">{m.phone}</p>
                </div>
              </div>
              <span className={`rounded-md px-2 py-0.5 text-[11px] font-medium ${M_STATUS_MAP[m.status][1]}`}>
                {M_STATUS_MAP[m.status][0]}
              </span>
            </div>

            <div className="mt-3 flex items-center justify-between">
              <div>
                <p className="text-[11px] text-gray-600">總額度</p>
                <p className="text-sm font-bold text-gray-200">{M_fmt(m.allocated)}</p>
              </div>
              <div className="text-right">
                <p className="text-[11px] text-gray-600">今日損益</p>
                <p className={`text-sm font-bold ${M_pnlColor(m.todayPnl)}`}>{M_pnlText(m.todayPnl)}</p>
              </div>
            </div>

            {m.topNote && (
              <div className="mt-3 flex items-center gap-1.5 rounded-lg bg-amber-500/5 px-2.5 py-1.5">
                <M_PinIcon className="h-3.5 w-3.5 shrink-0 text-amber-400/70" />
                <span className="text-[11px] text-amber-400/90">{m.topNote}</span>
              </div>
            )}
          </button>
        ))}
        {M_filtered.length === 0 && (
          <p className="py-12 text-center text-sm text-gray-600">沒有符合條件的會員</p>
        )}
      </div>
    </>
  );
}

/* ---------- 個人風控設定區塊（唯讀） ---------- */
function M_RiskBlock({ risk, usedLoss = 0 }) {
  if (!risk) return null;
  const M_lossPct = risk.maxDailyLoss ? Math.min(usedLoss / risk.maxDailyLoss * 100, 100) : 0;
  const M_lossOver = usedLoss >= risk.maxDailyLoss && risk.maxDailyLoss > 0;
  return (
    <div className="mt-3 border-t border-white/5 pt-3">
      <div className="mb-2 flex items-center gap-1.5">
        <M_ShieldMini className="h-3.5 w-3.5 text-gray-500" />
        <p className="text-[11px] text-gray-500">個人風控設定</p>
      </div>

      {/* 每日最大虧損：顯示已用 / 上限 */}
      <div className="mb-3 rounded-xl bg-[#0F131A] p-3">
        <div className="mb-1.5 flex items-center justify-between text-[12px]">
          <span className="text-gray-500">每日最大虧損</span>
          <span className={M_lossOver ? "font-bold text-red-400" : "text-gray-300"}>
            已用 {M_fmt(usedLoss)} / 上限 {M_fmt(risk.maxDailyLoss)}
          </span>
        </div>
        <div className="h-1.5 w-full overflow-hidden rounded-full bg-white/5">
          <div className={`h-full rounded-full ${M_lossOver ? "bg-red-500" : M_lossPct > 70 ? "bg-amber-500" : "bg-blue-500"}`}
            style={{ width: M_lossPct + "%" }} />
        </div>
        {M_lossOver && <p className="mt-1.5 text-[11px] text-red-400">已達上限，禁止開倉</p>}
      </div>

      <M_Row k="單筆最大金額" v={M_fmt(risk.maxOrderAmount)} />
      <M_Row k="單筆最大數量" v={`${risk.maxOrderQty} 張/口`} />
      <M_Row k="每日交易量上限" v={M_fmt(risk.maxDailyVolume)} />
      <div className="mt-2 flex items-center justify-between">
        <span className="text-[13px] text-gray-500">可交易市場</span>
        <div className="flex flex-wrap justify-end gap-1">
          {risk.markets.map((mk) => (
            <span key={mk} className="rounded bg-white/5 px-1.5 py-0.5 text-[10px] text-gray-400">{mk}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* =============================================================
   龍英交易管理後台 — 出入金管理（手機版）
   - 頂部分頁切換：入金 / 出金（各帶待審筆數紅點）

   - 學習專案：確認後顯示模擬結果，不接真實金流

const F_fmt = (n) => "$" + n.toLocaleString("en-US");

// 擔保比例統一標準（與丙種追繳頁一致）：強制線 50%、安全線 60%
// 丙種保證金風控（與其他頁一致）：最低維持 = 已投入 × 20%、判斷扣累計利息
const F_MAINTENANCE_RATE = 0.20;
function F_calcMargin(invested, margin, accruedInterest) {
  const F_threshold = invested * F_MAINTENANCE_RATE;
  const F_netValue = margin - accruedInterest;
  const F_shortfall = Math.max(0, F_threshold - F_netValue);
  const F_available = Math.max(0, F_netValue - F_threshold);
  const F_needCall = F_netValue < F_threshold;
  const F_health = F_threshold > 0 ? F_netValue / F_threshold : 1;
  return { F_threshold, F_netValue, F_shortfall, F_available, F_needCall, F_health };
}
const F_marginColor = (F_health) => (F_health >= 1.2 ? "text-emerald-400" : F_health >= 1 ? "text-amber-400" : "text-red-400");
const F_marginBar = (F_health) => (F_health >= 1.2 ? "bg-emerald-500" : F_health >= 1 ? "bg-amber-500" : "bg-red-500");

/* ---------- 滑動確認 ---------- */
function F_SlideToConfirm({ onComplete, label }) {
  const [x, setX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const F_trackRef = React.useRef(null);
  const F_maxX = () => (F_trackRef.current ? F_trackRef.current.offsetWidth - 56 : 240);
  const F_move = (clientX) => {
    if (!F_trackRef.current) return;
    const F_rect = F_trackRef.current.getBoundingClientRect();
    let nx = Math.max(0, Math.min(clientX - F_rect.left - 28, F_maxX()));
    setX(nx);
    if (nx >= F_maxX() - 4) { setDragging(false); onComplete(); }
  };
  return (
    <div className="mt-5">
      <div ref={F_trackRef} className="relative h-14 w-full overflow-hidden rounded-2xl bg-blue-500/15"
        onMouseMove={(e) => dragging && F_move(e.clientX)}
        onMouseUp={() => { setDragging(false); setX(0); }}
        onMouseLeave={() => { setDragging(false); setX(0); }}
        onTouchMove={(e) => F_move(e.touches[0].clientX)}
        onTouchEnd={() => setX(0)}>
        <span className="absolute inset-0 flex items-center justify-center text-sm font-medium text-blue-300/80">{label} →</span>
        <button onMouseDown={() => setDragging(true)}
          className="absolute top-1 flex h-12 w-12 items-center justify-center rounded-xl bg-blue-500 text-white"
          style={{ left: (4 + x) + "px", touchAction: "none" }}>
          <F_ArrowRightIcon className="h-6 w-6" />
        </button>
      </div>
      <p className="mt-2 text-center text-[11px] text-gray-600">防誤觸：需滑到底才會送出</p>
    </div>
  );
}

/* =============================================================
   龍英交易管理後台 — 丙種追繳（手機版，核心頁）
   流程：T 日收盤算擔保比例 → 跌破強制線通知客戶 →
        T+1 10:00 前補款解除 / 未補款交易員手動平倉
   - 頂部：T+1 10:00 倒數
   - 名單：每位被追繳客戶（擔保比例、借款、狀態）
   - 詳細：持倉明細（張數 / 佔當日成交量 / 建議平倉方式）、
          需賣多少回到安全線
   - 操作：重發通知 / 確認補款解除 / 手動平倉（滑動確認）
   學習專案：操作為模擬，不接真實下單與金流
   設計 Token 沿用手機版（深色）
   ============================================================= */

// ============================================================
// 丙種保證金風控（依規則：槓桿5倍、最低維持=已投入×20%、判斷需扣累計利息）
// ============================================================
const C_MAINTENANCE_RATE = 0.20;      // 最低維持率：已投入金額 × 20%
const C_DAILY_INTEREST_RATE = 0.0004; // 萬分之四 / 日（計息基準 = 實際買入總額）

// 計算保證金風控狀態
function C_calcMargin(invested, margin, accruedInterest) {
  const C_threshold = invested * C_MAINTENANCE_RATE;        // 最低保證金需求（門檻）
  const C_netValue = margin - accruedInterest;            // 扣利息後淨值（判斷用）
  const C_shortfall = Math.max(0, C_threshold - C_netValue);  // 需補保金額
  const C_available = Math.max(0, C_netValue - C_threshold);  // 可用資金
  const C_needCall = C_netValue < C_threshold;                // 是否觸發補保
  // 健康度：淨值 / 門檻（≥1 安全，<1 需補保），供顏色判斷
  const C_health = C_threshold > 0 ? C_netValue / C_threshold : 1;
  return { C_threshold, C_netValue, C_shortfall, C_available, C_needCall, C_health };
}
const C_dailyInterest = (invested) => Math.round(invested * C_DAILY_INTEREST_RATE);
// 保證金健康度顏色：淨值遠高於門檻=綠、接近門檻=黃、低於門檻=紅
const C_marginColor = (C_health) => (C_health >= 1.2 ? "text-emerald-400" : C_health >= 1 ? "text-amber-400" : "text-red-400");
const C_marginBar = (C_health) => (C_health >= 1.2 ? "bg-emerald-500" : C_health >= 1 ? "bg-amber-500" : "bg-red-500");

const C_CALLS_INIT = [

    ],
  },

function C_App() {
  const [calls, setCalls] = useState(C_CALLS_INIT);
  const [selected, setSelected] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [closingId, setClosingId] = useState(null); // 正在執行平倉下單的客戶
  const [toast, setToast] = useState(null);

  const C_applyResult = (data) => {
    if (data.act === "resolve") {
      setCalls((prev) => prev.map((c) => c.id === data.id ? { ...c, status: "resolved" } : c));
      setSelected(null);
      setToast("已確認補款，追繳解除");
    } else if (data.act === "forceclose") {
      // 滑動確認後：啟動平倉程序 → 進入下單頁（不直接完成）
      setClosingId(data.id);
      setSelected(null);
    } else if (data.act === "notify") {
      setToast("已重發追繳通知");
    }
  };

  // 下單頁回傳：完成平倉
  const C_finishClosing = (id, msg) => {
    setCalls((prev) => prev.map((c) => c.id === id ? { ...c, status: "force_closing" } : c));
    setClosingId(null);
    setToast(msg || "平倉程序已執行");
  };

  useEffect(() => {
    if (!toast) return;
    const C_t = setTimeout(() => setToast(null), 2200);
    return () => clearTimeout(C_t);
  }, [toast]);

  const C_current = selected ? calls.find((c) => c.id === selected) : null;
  const C_closing = closingId ? calls.find((c) => c.id === closingId) : null;

  return (
    <div className="phone-frame text-gray-100">
      {C_closing
        ? <C_CloseOrderPage c={C_closing} onBack={() => setClosingId(null)} onFinish={C_finishClosing} />
        : C_current
        ? <C_Detail c={C_current} onBack={() => setSelected(null)} onAction={setConfirm} />
        : <C_ListPage calls={calls} onSelect={setSelected} />}

      {confirm && <C_ConfirmSheet data={confirm} onClose={() => setConfirm(null)} onConfirmed={C_applyResult} />}
      {toast && (
        <div className="fixed inset-x-0 bottom-6 z-40 mx-auto flex max-w-[420px] justify-center px-4">
          <div className="flex items-center gap-2 rounded-full bg-emerald-500/90 px-4 py-2.5 text-sm font-medium text-white shadow-lg">
            <C_CheckIcon className="h-4 w-4" /> {toast}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- T+1 10:00 倒數 ---------- */
function C_Countdown() {
  // 以「明日 10:00」為截止；demo 直接顯示距離下一個 10:00 的時間
  const [left, setLeft] = useState("");
  useEffect(() => {
    const C_calc = () => {
      const C_now = new Date();
      const C_deadline = new Date(C_now);
      C_deadline.setHours(10, 0, 0, 0);
      if (C_now.getHours() >= 10) C_deadline.setDate(C_deadline.getDate() + 1); // 過了今天10點就算明天
      const C_diff = Math.max(0, C_deadline - C_now);
      const C_h = Math.floor(C_diff / 3600000);
      const C_m = Math.floor((C_diff % 3600000) / 60000);
      const C_s = Math.floor((C_diff % 60000) / 1000);
      setLeft(`${String(C_h).padStart(2,"0")}:${String(C_m).padStart(2,"0")}:${String(C_s).padStart(2,"0")}`);
    };
    C_calc();
    const C_t = setInterval(C_calc, 1000);
    return () => clearInterval(C_t);
  }, []);
  return (
    <div className="rounded-2xl border border-red-500/30 bg-red-500/10 p-4">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <C_ClockIcon className="h-5 w-5 text-red-400" />
          <span className="text-sm font-semibold text-red-400">補款截止倒數</span>
        </div>
        <span className="font-mono text-2xl font-bold tracking-wider text-red-400">{left}</span>
      </div>
      <p className="mt-1.5 text-[11px] text-gray-400">明日 10:00 前未補款，將通知交易員手動平倉</p>
    </div>
  );
}

/* ---------- 強制平倉下單頁（交易員逐檔手動下單） ---------- */
function C_CloseOrderPage({ c, onBack, onFinish }) {
  // 每檔的剩餘可賣張數與下單表單狀態
  const [remaining, setRemaining] = useState(() => {
    const C_o = {};
    c.positions.forEach((p) => { C_o[p.code] = p.qty; });
    return C_o;
  });
  const [soldAmount, setSoldAmount] = useState(0);
  const [orders, setOrders] = useState([]); // 已送出的賣單紀錄
  const [pendingOrder, setPendingOrder] = useState(null); // 待確認的賣單

  const C_m0 = C_calcMargin(c.invested, c.margin, c.accruedInterest);
  const C_needSell = Math.ceil(C_m0.C_shortfall / 10000) * 10000; // 目標：補回需補保金額
  const C_reached = soldAmount >= C_needSell;

  // 平倉模型：賣股票所得回補保證金 → 淨值往門檻爬升
  const C_liveNet = C_m0.C_netValue + soldAmount;
  const C_liveHealth = C_m0.C_threshold > 0 ? C_liveNet / C_m0.C_threshold : 1;

  const C_submitOrder = (order) => {
    const C_amount = order.price * order.qty * C_SHARES_PER_LOT;
    setRemaining((prev) => ({ ...prev, [order.code]: prev[order.code] - order.qty }));
    setSoldAmount((prev) => prev + C_amount);
    setOrders((prev) => [{ ...order, C_amount, time: C_nowTime() }, ...prev]);
    setPendingOrder(null);
  };

  return (
    <div className="phone-frame text-gray-100">
      <header className="sticky top-0 z-20 border-b border-white/5 bg-[#0B0E14]/95 px-4 py-3 backdrop-blur">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex h-9 w-9 items-center justify-center rounded-full bg-white/5" aria-label="返回">
            <C_BackIcon className="h-5 w-5 text-gray-300" />
          </button>
          <div className="flex items-center gap-2">
            <h1 className="text-lg font-bold text-white">強制平倉</h1>
            <span className="text-sm text-gray-500">{c.name}</span>
            <span className="rounded px-1.5 py-0.5 text-[11px] font-medium bg-violet-500/15 text-violet-400">B 丙種</span>
          </div>
        </div>
      </header>

      <div className="px-4 pt-4 pb-32 space-y-4">
        {/* 進度區 */}
        <div className={`rounded-2xl p-4 ${C_reached ? "border border-emerald-500/30 bg-emerald-500/10" : "border border-red-500/25 bg-[#161B24]"}`}>
          <div className="flex items-center justify-between">
            <span className="text-sm font-semibold text-gray-200">平倉進度</span>
            {C_reached
              ? <span className="flex items-center gap-1 text-[12px] font-medium text-emerald-400"><C_CheckIcon className="h-4 w-4" />已補足保證金</span>
              : <span className="text-[12px] text-gray-500">目標補回保證金門檻</span>}
          </div>
          <div className="mt-3 flex items-end justify-between">
            <div>
              <p className="text-[11px] text-gray-600">已平倉金額</p>
              <p className={`text-2xl font-bold ${C_reached ? "text-emerald-400" : "text-gray-100"}`}>{C_fmt(soldAmount)}</p>
            </div>
            <div className="text-right">
              <p className="text-[11px] text-gray-600">需補保</p>
              <p className="text-sm font-bold text-gray-400">{C_fmtCeilWan(C_m0.C_shortfall)}</p>
            </div>
          </div>
          <div className="mt-3 h-2 w-full overflow-hidden rounded-full bg-white/5">
            <div className={`h-full rounded-full transition-all ${C_reached ? "bg-emerald-500" : "bg-red-500"}`}
              style={{ width: Math.min(C_needSell > 0 ? soldAmount / C_needSell * 100 : 100, 100) + "%" }} />
          </div>
          {/* 即時保證金淨值 vs 門檻 */}
          <div className="mt-3 flex items-center justify-between rounded-xl bg-[#0F131A] px-3 py-2">
            <span className="text-[12px] text-gray-500">保證金淨值 / 門檻</span>
            <span className={`text-sm font-bold ${C_liveHealth < 1 ? "text-red-400" : "text-emerald-400"}`}>
              {C_fmt(C_liveNet)} / {C_fmt(C_m0.C_threshold)}
            </span>
          </div>
        </div>

        {/* 逐檔下單 */}
        <p className="px-1 text-sm font-semibold text-gray-200">逐檔下單</p>
        {c.positions.map((p) => (
          <C_OrderCard key={p.code} p={p} remaining={remaining[p.code]} onSubmit={setPendingOrder} />
        ))}

        {/* 已送出賣單 */}
        {orders.length > 0 && (
          <div>
            <p className="mb-2 px-1 text-sm font-semibold text-gray-200">已送出賣單</p>
            <div className="rounded-2xl bg-[#161B24] p-2">
              <ul className="divide-y divide-white/5">
                {orders.map((C_o, i) => (
                  <li key={i} className="flex items-center justify-between px-2 py-2.5">
                    <div className="flex items-center gap-2">
                      <span className="rounded bg-emerald-500/10 px-1.5 py-0.5 text-[10px] font-medium text-emerald-400">已成交</span>
                      <span className="text-[13px] text-gray-300">{C_o.name} {C_o.qty}張 · {C_o.kindLabel}</span>
                    </div>
                    <span className="text-[12px] text-gray-500">{C_fmt(C_o.C_amount)}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        )}
      </div>

      {/* 底部完成 */}
      <div className="fixed inset-x-0 bottom-0 z-20 mx-auto max-w-[420px] border-t border-white/5 bg-[#0B0E14]/95 px-4 py-3 backdrop-blur">
        <button
          onClick={() => onFinish(c.id, C_reached ? "平倉完成，保證金淨值已回到門檻" : "平倉程序已結束（未達門檻）")}
          className={`h-12 w-full rounded-xl text-sm font-semibold active:scale-95 ${
            C_reached ? "bg-emerald-500 text-white" : orders.length > 0 ? "bg-white/10 text-gray-200" : "bg-white/5 text-gray-500"}`}>
          {C_reached ? "完成平倉程序" : orders.length > 0 ? "結束平倉程序（未達目標）" : "尚未下單"}
        </button>
      </div>

      {/* 賣單確認 */}
      {pendingOrder && (
        <C_OrderConfirm order={pendingOrder} onClose={() => setPendingOrder(null)} onConfirm={C_submitOrder} />
      )}
    </div>
  );
}

/* ---------- 單檔下單卡 ---------- */
function C_OrderCard({ p, remaining, onSubmit }) {
  const [kind, setKind] = useState(p.liquidity === "high" ? "market" : "limit"); // 流動性好預設市價
  const [tif, setTif] = useState(p.liquidity === "high" ? "IOC" : "ROD");
  const [qty, setQty] = useState(Math.min(p.suggestQty || 0, remaining) || (remaining > 0 ? 1 : 0));
  const [price, setPrice] = useState(p.price);

  const C_sold = p.qty - remaining;
  const C_canSubmit = remaining > 0 && qty > 0 && qty <= remaining && (kind === "market" || price > 0);

  return (
    <div className="rounded-2xl bg-[#161B24] p-4">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <span className="text-sm font-semibold text-gray-100">{p.name}</span>
          <span className="text-[11px] text-gray-500">{p.code}</span>
        </div>
        <span className="text-[12px] text-gray-500">剩 {remaining} / {p.qty} 張</span>
      </div>

      {/* 佔成交量 + 建議 */}
      <div className="mt-2 flex items-start gap-1.5 rounded-lg bg-[#0F131A] px-3 py-2">
        <C_BulbIcon className="mt-0.5 h-3.5 w-3.5 shrink-0 text-amber-400/70" />
        <span className="text-[11px] text-gray-400">佔成交量 {p.volPct}% · {p.advice}</span>
      </div>

      {remaining > 0 ? (
        <>
          {/* 市價 / 限價 */}
          <div className="mt-3 flex gap-2">
            <C_SegBtn active={kind==="market"} onClick={() => setKind("market")} label="市價" />
            <C_SegBtn active={kind==="limit"} onClick={() => setKind("limit")} label="限價" />
          </div>

          {/* 委託類型 */}
          <div className="mt-2 flex gap-2">
            {["ROD","IOC","FOK"].map((C_t) => (
              <C_SegBtn key={C_t} active={tif===C_t} onClick={() => setTif(C_t)} label={C_t} small />
            ))}
          </div>

          {/* 張數 + 限價 */}
          <div className="mt-3 flex gap-2">
            <div className="flex-1">
              <label className="text-[11px] text-gray-500">張數（建議 {p.suggestQty}）</label>
              <div className="mt-1 flex items-center rounded-xl bg-[#0F131A]">
                <button onClick={() => setQty((q) => Math.max(0, q-1))} className="flex h-11 w-10 items-center justify-center text-gray-400 active:scale-90">−</button>
                <input type="number" value={qty} onChange={(e)=>setQty(Math.max(0, Math.min(remaining, Number(e.target.value))))}
                  className="w-full bg-transparent py-2.5 text-center text-base font-bold text-white outline-none" />
                <button onClick={() => setQty((q) => Math.min(remaining, q+1))} className="flex h-11 w-10 items-center justify-center text-gray-400 active:scale-90">+</button>
              </div>
            </div>
            {kind === "limit" && (
              <div className="flex-1">
                <label className="text-[11px] text-gray-500">限價</label>
                <input type="number" value={price} onChange={(e)=>setPrice(Number(e.target.value))}
                  className="mt-1 w-full rounded-xl bg-[#0F131A] py-2.5 text-center text-base font-bold text-white outline-none" />
              </div>
            )}
          </div>

          <button disabled={!C_canSubmit}
            onClick={() => onSubmit({ code: p.code, name: p.name, kind, tif, qty,
              price: kind === "market" ? p.price : price,
              kindLabel: (kind === "market" ? "市價" : "限價 " + price) + " / " + tif })}
            className={`mt-3 h-11 w-full rounded-xl text-sm font-semibold active:scale-95 ${
              C_canSubmit ? "bg-red-500/15 text-red-400" : "cursor-not-allowed bg-white/5 text-gray-600"}`}>
            送出此筆賣單
          </button>
        </>
      ) : (
        <p className="mt-3 rounded-lg bg-emerald-500/5 py-2 text-center text-[12px] text-emerald-400/80">已全部賣出（{C_sold} 張）</p>
      )}
    </div>
  );
}

function C_SegBtn({ active, onClick, label, small }) {
  return (
    <button onClick={onClick}
      className={`flex-1 rounded-lg py-2 font-medium transition-colors ${small ? "text-[12px]" : "text-sm"} ${
        active ? "bg-blue-500 text-white" : "bg-[#0F131A] text-gray-400"}`}>
      {label}
    </button>
  );
}

/* ---------- 賣單確認（輕量） ---------- */
function C_OrderConfirm({ order, onClose, onConfirm }) {
  const C_amount = order.price * order.qty * C_SHARES_PER_LOT;
  return (
    <div className="fixed inset-0 z-30 mx-auto flex max-w-[420px] flex-col justify-end bg-black/60" onClick={onClose}>
      <div className="rounded-t-3xl bg-[#161B24] p-5 pb-8" onClick={(e) => e.stopPropagation()}>
        <div className="mx-auto mb-4 h-1 w-10 rounded-full bg-white/15" />
        <h3 className="text-lg font-bold text-white">確認賣單</h3>
        <div className="mt-4 space-y-2 rounded-xl bg-[#0F131A] p-4">
          <C_Row k="商品" v={`${order.name} ${order.code}`} />
          <C_Row k="方向" v="賣出" vClass="text-red-400" />
          <C_Row k="張數" v={`${order.qty} 張`} />
          <C_Row k="委託" v={order.kindLabel} />
          <C_Row k="預估金額" v={C_fmt(C_amount)} vClass="text-gray-100" />
        </div>
        <div className="mt-5 flex gap-3">
          <button onClick={onClose} className="h-12 flex-1 rounded-xl bg-white/5 text-sm font-medium text-gray-300 active:scale-95">取消</button>
          <button onClick={() => onConfirm(order)} className="h-12 flex-1 rounded-xl bg-red-500 text-sm font-semibold text-white active:scale-95">確認送出</button>
        </div>
      </div>
    </div>
  );
}

function C_nowTime() {
  const C_n = new Date();
  return `${String(C_n.getHours()).padStart(2,"0")}:${String(C_n.getMinutes()).padStart(2,"0")}:${String(C_n.getSeconds()).padStart(2,"0")}`;
}

/* ---------- 二次確認面板 ---------- */
function C_ConfirmSheet({ data, onClose, onConfirmed }) {
  const [done, setDone] = useState(false);
  const C_finish = () => {
    setDone(true);
    setTimeout(() => { onConfirmed(data); onClose(); }, 800);
  };
  return (
    <div className="fixed inset-0 z-30 mx-auto flex max-w-[420px] flex-col justify-end bg-black/60" onClick={onClose}>
      <div className="rounded-t-3xl bg-[#161B24] p-5 pb-8" onClick={(e) => e.stopPropagation()}>
        <div className="mx-auto mb-4 h-1 w-10 rounded-full bg-white/15" />
        {done ? (
          <div className="py-8 text-center">
            <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-emerald-500/15">
              <C_CheckIcon className="h-7 w-7 text-emerald-400" />

            <p className="mt-1 text-sm text-gray-500">（模擬：未連接真實券商與金流）</p>

            <p className="mt-3 whitespace-pre-line text-sm leading-relaxed text-gray-300">{data.body}</p>
            {data.slide ? (
              <C_SlideToConfirm onComplete={C_finish} label={data.confirmLabel} />

                  {data.confirmLabel}
                </button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ---------- 滑動確認 ---------- */
function C_SlideToConfirm({ onComplete, label }) {
  const [x, setX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const C_trackRef = React.useRef(null);
  const C_maxX = () => (C_trackRef.C_current ? C_trackRef.C_current.offsetWidth - 56 : 240);
  const C_move = (clientX) => {
    if (!C_trackRef.C_current) return;
    const C_rect = C_trackRef.C_current.getBoundingClientRect();
    let nx = Math.max(0, Math.min(clientX - C_rect.left - 28, C_maxX()));
    setX(nx);
    if (nx >= C_maxX() - 4) { setDragging(false); onComplete(); }
  };
  return (
    <div className="mt-5">
      <div ref={C_trackRef} className="relative h-14 w-full overflow-hidden rounded-2xl bg-red-500/15"
        onMouseMove={(e) => dragging && C_move(e.clientX)}
        onMouseUp={() => { setDragging(false); setX(0); }}
        onMouseLeave={() => { setDragging(false); setX(0); }}
        onTouchMove={(e) => C_move(e.touches[0].clientX)}
        onTouchEnd={() => setX(0)}>
        <span className="absolute inset-0 flex items-center justify-center text-sm font-medium text-red-300/80">{label} →</span>
        <button onMouseDown={() => setDragging(true)}
          className="absolute top-1 flex h-12 w-12 items-center justify-center rounded-xl bg-red-500 text-white"
          style={{ left: (4 + x) + "px", touchAction: "none" }}>
          <C_ArrowRightIcon className="h-6 w-6" />
        </button>
      </div>
      <p className="mt-2 text-center text-[11px] text-gray-600">防誤觸：需滑到底才會送出</p>
    </div>
  );
}

            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <S_SendIcon className="h-4 w-4 text-blue-400" />
                <span className="text-sm font-medium text-gray-200">Telegram Bot</span>
              </div>
              <span className={`text-[12px] font-medium ${tgBound ? "text-emerald-400" : "text-gray-500"}`}>
                {tgBound ? "已綁定" : "未綁定"}
              </span>
            </div>
            <p className="mt-2 text-[11px] text-gray-600">綁定後接收委託、財務、風控、丙種推播</p>
            <button
              onClick={() => setConfirm(tgBound
                ? { act: "tgUnbind", title: "解除 Telegram 綁定", body: "解除後將不再透過 Telegram 接收推播通知。", danger: true, confirmLabel: "確認解除" }
                : { act: "tgBind", title: "綁定 Telegram", body: "將開啟綁定流程：取得綁定連結 → 於 Telegram 啟動 Bot → 自動完成綁定。", confirmLabel: "開始綁定" })}
              className={`mt-3 h-11 w-full rounded-xl text-sm font-semibold active:scale-95 ${
                tgBound ? "bg-white/5 text-gray-300" : "bg-blue-500 text-white"}`}>
              {tgBound ? "解除綁定" : "綁定 Telegram"}
            </button>
          </div>
          <S_RO label="Email 通知" value="財務、帳號、丙種事件" />
        </S_Section>

        {/* 系統資訊 */}
        <S_Section title="系統資訊" icon={<S_InfoIcon className="h-4 w-4" />}>
          <S_RO label="系統版本" value="V2.0（兩層架構）" />
          <S_RO label="架構" value="NestJS + PostgreSQL + Redis" />
        </S_Section>

        <p className="px-1 text-center text-[11px] text-gray-600">多數設定為唯讀，調整請至桌機後台</p>
      </div>

      {confirm && <S_ConfirmSheet data={confirm} onClose={() => setConfirm(null)} onConfirmed={S_apply} />}
    </div>
  );
}

/* ---------- 區塊 ---------- */
function S_Section({ title, icon, children }) {
  return (
    <div>
      <div className="mb-2 flex items-center gap-2 px-1">
        <span className="text-gray-500">{icon}</span>
        <h2 className="text-sm font-semibold text-gray-200">{title}</h2>
      </div>
      <div className="space-y-2 rounded-2xl bg-[#161B24] p-3">
        {children}
      </div>
    </div>
  );
}

/* ---------- 唯讀列 ---------- */
function S_RO({ label, value, hint, valueClass = "text-gray-200" }) {
  return (
    <div className="flex items-center justify-between px-1 py-1.5">
      <div>
        <span className="text-[13px] text-gray-400">{label}</span>
        {hint && <p className="text-[11px] text-gray-600">{hint}</p>}
      </div>
      <span className={`text-[13px] font-medium ${valueClass}`}>{value}</span>
    </div>
  );
}

/* ---------- 二次確認面板 ---------- */
function S_ConfirmSheet({ data, onClose, onConfirmed }) {
  const [done, setDone] = useState(false);
  const S_finish = () => { setDone(true); setTimeout(() => { onConfirmed(data); onClose(); }, 800); };
  return (
    <div className="fixed inset-0 z-30 mx-auto flex max-w-[420px] flex-col justify-end bg-black/60" onClick={onClose}>
      <div className="rounded-t-3xl bg-[#161B24] p-5 pb-8" onClick={(e) => e.stopPropagation()}>
        <div className="mx-auto mb-4 h-1 w-10 rounded-full bg-white/15" />
        {done ? (
          <div className="py-8 text-center">
            <div className="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-emerald-500/15">
              <S_CheckIcon className="h-7 w-7 text-emerald-400" />
            </div>
            <p className="text-base font-semibold text-white">已完成</p>
            <p className="mt-1 text-sm text-gray-500">（模擬操作）</p>
          </div>
        ) : (
          <>
            <h3 className={`text-lg font-bold ${data.danger ? "text-red-400" : "text-white"}`}>{data.title}</h3>
            <p className="mt-3 whitespace-pre-line text-sm leading-relaxed text-gray-300">{data.body}</p>
            <div className="mt-5 flex gap-3">
              <button onClick={onClose} className="h-12 flex-1 rounded-xl bg-white/5 text-sm font-medium text-gray-300 active:scale-95">取消</button>
              <button onClick={S_finish}
                className={`h-12 flex-1 rounded-xl text-sm font-semibold text-white active:scale-95 ${data.danger ? "bg-red-500" : "bg-blue-500"}`}>
                {data.confirmLabel}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ---------- 圖示 ---------- */
function S_b(p){return{fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round",viewBox:"0 0 24 24",...p};}
function S_BackIcon(p){return(<svg {...S_b(p)}><path d="M15 6l-6 6 6 6"/></svg>);}
function S_SlidersIcon(p){return(<svg {...S_b(p)}><path d="M5 21V14M5 10V3M12 21V12M12 8V3M19 21V16M19 12V3"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="10" r="2"/><circle cx="19" cy="14" r="2"/></svg>);}
function S_BoltIcon(p){return(<svg {...S_b(p)}><path d="M13 3L4 14h7l-1 7 9-11h-7z"/></svg>);}
function S_LockIcon(p){return(<svg {...S_b(p)}><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>);}
function S_CashIcon(p){return(<svg {...S_b(p)}><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>);}
function S_CalendarIcon(p){return(<svg {...S_b(p)}><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg>);}
function S_ShieldIcon(p){return(<svg {...S_b(p)}><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg>);}
function S_BellIcon(p){return(<svg {...S_b(p)}><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>);}
function S_SendIcon(p){return(<svg {...S_b(p)}><path d="M21 4L3 11l7 3 3 7z"/><path d="M21 4l-11 10"/></svg>);}
function S_InfoIcon(p){return(<svg {...S_b(p)}><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8v.5"/></svg>);}
function S_CheckIcon(p){return(<svg {...S_b(p)}><path d="M5 13l4 4L19 7"/></svg>);}




// ============================================================
// 總殼：頁面切換 + 底部導覽
// ============================================================
function RootApp() {
  const [page, setPage] = React.useState("dashboard");
  const [moreOpen, setMoreOpen] = React.useState(false);
  window.__go = (p) => { setPage(p); setMoreOpen(false); window.scrollTo(0,0); };
  const PAGES = {
    dashboard: D_App, members: M_App, funds: F_App, positions: P_App,
    risk: R_App, margincall: C_App, notif: N_App, settings: S_App,
  };
  const Current = PAGES[page] || D_App;
  const mainNav = [
    { key: "dashboard", label: "儀表板", icon: NavGrid },
    { key: "members", label: "會員", icon: NavUsers },
    { key: "margincall", label: "追繳", icon: NavAlert, badge: 2 },
    { key: "__more", label: "更多", icon: NavMenu, badge: 2 },
  ];
  const moreNav = [
    { key: "funds", label: "出入金管理", icon: NavExchange },
    { key: "positions", label: "部位總覽", icon: NavBriefcase },
    { key: "risk", label: "風控管理", icon: NavShield, badge: 2 },
    { key: "notif", label: "通知紀錄", icon: NavBell },
    { key: "settings", label: "系統設定", icon: NavGear },
  ];
  return (
    <div>
      <div style={{ paddingBottom: "72px" }}>
        <Current key={page} />
      </div>
      {moreOpen && (
        <div className="fixed inset-0 z-40 mx-auto flex max-w-[420px] flex-col justify-end bg-black/60" onClick={() => setMoreOpen(false)}>
          <div className="rounded-t-3xl bg-[#161B24] p-4 pb-8" onClick={(e) => e.stopPropagation()}>
            <div className="mx-auto mb-4 h-1 w-10 rounded-full bg-white/15" />
            <p className="mb-2 px-2 text-sm font-semibold text-gray-200">更多功能</p>
            <div className="space-y-1">
              {moreNav.map((n) => {
                const Icon = n.icon;
                return (
                  <button key={n.key} onClick={() => window.__go(n.key)}
                    className="flex w-full items-center gap-3 rounded-xl px-3 py-3.5 text-left text-gray-200 active:bg-white/5">
                    <span className="flex h-9 w-9 items-center justify-center rounded-lg bg-white/5"><Icon className="h-5 w-5" /></span>
                    <span className="flex-1 text-sm font-medium">{n.label}</span>
                    {n.badge && <span className="flex h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1.5 text-[11px] font-semibold text-white">{n.badge}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
      <nav className="fixed inset-x-0 bottom-0 z-30 mx-auto max-w-[420px] border-t border-white/5 bg-[#0B0E14]/95 backdrop-blur">
        <div className="grid grid-cols-4 pb-[env(safe-area-inset-bottom)]">
          {mainNav.map((n) => {
            const Icon = n.icon;
            const isMore = n.key === "__more";
            const active = isMore ? moreOpen : (page === n.key && !moreOpen);
            return (
              <button key={n.key} onClick={() => isMore ? setMoreOpen(!moreOpen) : window.__go(n.key)}
                className={`relative flex flex-col items-center gap-1 py-2.5 ${active ? "text-blue-400" : "text-gray-500"}`}>
                <div className="relative">
                  <Icon className="h-6 w-6" />
                  {n.badge && <span className="absolute -right-2 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-semibold text-white">{n.badge}</span>}
                </div>
                <span className="text-[11px]">{n.label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}
function navBase(p){return{fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round",viewBox:"0 0 24 24",...p};}
function NavGrid(p){return(<svg {...navBase(p)}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>);}
function NavUsers(p){return(<svg {...navBase(p)}><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6"/></svg>);}
function NavAlert(p){return(<svg {...navBase(p)}><path d="M12 4l9 16H3z"/><path d="M12 10v4M12 17.5v.5"/></svg>);}
function NavMenu(p){return(<svg {...navBase(p)}><path d="M4 7h16M4 12h16M4 17h16"/></svg>);}
function NavExchange(p){return(<svg {...navBase(p)}><path d="M4 8h13l-3-3"/><path d="M20 16H7l3 3"/></svg>);}
function NavBriefcase(p){return(<svg {...navBase(p)}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>);}
function NavShield(p){return(<svg {...navBase(p)}><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg>);}
function NavBell(p){return(<svg {...navBase(p)}><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>);}
function NavGear(p){return(<svg {...navBase(p)}><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M5 5l1.5 1.5M17.5 17.5L19 19M3 12h2M19 12h2M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>);}

ReactDOM.createRoot(document.getElementById("root")).render(<RootApp />);
</script>
</body>
</html>
